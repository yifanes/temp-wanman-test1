name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Run ESLint
        if: hashFiles('package.json') != ''
        run: npm run lint

      - name: Check for trailing whitespace
        run: |
          if grep -rn '[[:blank:]]$' README.md CHANGELOG.md LICENSE CONTRIBUTING.md 2>/dev/null; then
            echo "::error::Trailing whitespace found"
            exit 1
          fi
          echo "No trailing whitespace found"

      - name: Check for valid markdown structure
        run: |
          for f in *.md; do
            if [ -f "$f" ]; then
              echo "Checking $f ..."
              if ! head -1 "$f" | grep -qE '^#|^$|^---'; then
                echo "::warning file=$f::File does not start with a heading or frontmatter"
              fi
            fi
          done
          echo "Markdown structure check passed"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Run ESLint
        if: hashFiles('package.json') != ''
        run: npm run lint

      - name: Run tests
        if: hashFiles('package.json') != ''
        run: npm test

      - name: Verify project files
        run: |
          echo "Verifying key project files..."
          test -f README.md  || { echo "::error::README.md missing"; exit 1; }
          test -f LICENSE    || { echo "::error::LICENSE missing"; exit 1; }
          test -f CHANGELOG.md || { echo "::error::CHANGELOG.md missing"; exit 1; }
          echo "All project file checks passed"
